<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Ghép Đôi Từ Vựng - Memory Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            margin-bottom: 5px;
            color: #2c3e50;
            text-align: center;
        }

        p.instruction {
            color: #7f8c8d;
            margin-bottom: 25px;
            text-align: center;
            max-width: 600px;
            font-size: 1rem;
        }

        /* Lưới chứa các thẻ bài */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 800px;
            perspective: 1000px;
        }

        /* Định hình thẻ bài */
        .card {
            height: 140px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* Trạng thái lật thẻ */
        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Trạng thái ẩn thẻ khi ghép đúng */
        .card.matched {
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s 0.5s, opacity 0.5s linear;
        }

        /* Các mặt của thẻ bài */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Mặt Úp (Mặt lưng chung của các thẻ) */
        .card-back {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: #ecf0f1;
            font-size: 2rem;
        }

        /* Mặt Ngửa của thẻ Tiếng Anh */
        .card-front-en {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            transform: rotateY(180deg);
        }

        /* Mặt Ngửa của thẻ Tiếng Việt */
        .card-front-vi {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            transform: rotateY(180deg);
            font-size: 1rem;
        }

        .audio-icon {
            font-size: 0.9rem;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Responsive cho màn hình điện thoại */
        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            .card {
                height: 110px;
            }
            .card-face {
                font-size: 0.95rem;
            }
            .card-front-vi {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <h1>🧩 Trò Chơi Ghép Cặp Từ Vựng</h1>
    <p class="instruction">Hãy lật một thẻ Tiếng Anh (Màu xanh) và một thẻ Tiếng Việt (Màu cam) có nghĩa khớp nhau. Nếu đúng, cặp thẻ sẽ biến mất. Khi lật thẻ Tiếng Anh, máy sẽ phát âm!</p>

    <div class="game-board" id="gameBoard"></div>

    <script>
        // Danh sách từ vựng gốc thu thập từ ảnh của bạn
        const baseVocabulary = [
            { id: 1, en: "Prominent", vi: "nổi bật, nổi tiếng, đáng chú ý" },
            { id: 2, en: "Alleviate", vi: "làm giảm bớt, xoa dịu" },
            { id: 3, en: "Authentic cultural exposure", vi: "sự tiếp xúc văn hóa chân thực" },
            { id: 4, en: "Off-the-beaten-track", vi: "ở nơi ít người biết đến" },
            { id: 5, en: "Spontaneous", vi: "tự phát, ngẫu hứng" },
            { id: 6, en: "Seamless", vi: "liền mạch, suôn sẻ" }
        ];

        let cardsData = [];
        let flippedCards = [];
        let lockBoard = false;

        // Tạo danh sách thẻ tách rời gồm cả thẻ Anh và thẻ Việt
        baseVocabulary.forEach(item => {
            // Thẻ tiếng Anh
            cardsData.push({
                matchId: item.id,
                type: 'en',
                text: item.en
            });
            // Thẻ tiếng Việt
            cardsData.push({
                matchId: item.id,
                type: 'vi',
                text: item.vi
            });
        });

        // Hàm xáo trộn mảng (Thuật toán Fisher-Yates) để mỗi lần chơi vị trí thẻ khác nhau
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Hàm phát âm tiếng Anh
        function speak(text) {
            window.speechSynthesis.cancel(); // Tắt âm cũ nếu click nhanh
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; // Tốc độ nói vừa phải
            window.speechSynthesis.speak(utterance);
        }

        const gameBoard = document.getElementById('gameBoard');

        // Tạo giao diện bàn cờ game
        function createBoard() {
            const shuffledCards = shuffle(cardsData);
            
            shuffledCards.forEach(cardInfo => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.matchId = cardInfo.matchId;
                card.dataset.type = cardInfo.type;
                card.dataset.text = cardInfo.text;

                // Xác định class màu sắc dựa trên ngôn ngữ thẻ
                const frontClass = cardInfo.type === 'en' ? 'card-front-en' : 'card-front-vi';
                const audioLabel = cardInfo.type === 'en' ? '<div class="audio-icon">🔊 Đang đọc...</div>' : '';

                card.innerHTML = `
                    <div class="card-face card-back">?</div>
                    <div class="card-face ${frontClass}">
                        <div>${cardInfo.text}</div>
                        ${audioLabel}
                    </div>
                `;

                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });
        }

        // Xử lý khi người dùng ấn lật thẻ
        function flipCard() {
            if (lockBoard) return; // Khóa bàn cờ khi đang đợi kiểm tra 2 thẻ trước
            if (this === flippedCards[0]) return; // Không cho click 2 lần vào cùng 1 thẻ

            this.classList.add('flipped');

            // Nếu lật trúng thẻ tiếng Anh -> Phát âm luôn
            if (this.dataset.type === 'en') {
                speak(this.dataset.text);
            }

            flippedCards.push(this);

            // Khi đã lật đủ 2 thẻ, tiến hành kiểm tra
            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        // Kiểm tra xem 2 thẻ có khớp cặp không
        function checkMatch() {
            const [card1, card2] = flippedCards;
            
            // So sánh ID cặp từ vựng của 2 thẻ
            const isMatch = card1.dataset.matchId === card2.dataset.matchId;

            if (isMatch) {
                disableCards(); // Nếu đúng -> Biến mất
            } else {
                unflipCards(); // Nếu sai -> Úp lại
            }
        }

        // Xử lý khi ghép ĐÚNG cặp
        function disableCards() {
            lockBoard = true;
            setTimeout(() => {
                flippedCards[0].classList.add('matched');
                flippedCards[1].classList.add('matched');
                
                resetTurn();
            }, 600); // Đợi hiệu ứng lật hoàn thành rồi ẩn đi
        }

        // Xử lý khi ghép SAI cặp
        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                flippedCards[0].classList.remove('flipped');
                flippedCards[1].classList.remove('flipped');

                resetTurn();
            }, 1300); // Cho người học nhìn thẻ sai trong 1.3 giây trước khi tự úp lại
        }

        // Khởi động lại lượt chọn mới
        function resetTurn() {
            flippedCards = [];
            lockBoard = false;
        }

        // Bắt đầu game
        createBoard();
    </script>
</body>
</html>
